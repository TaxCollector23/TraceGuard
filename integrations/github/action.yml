name: "TraceGuard CI"
description: "Run TraceGuard checks in CI and upload a sanitized summary. Never uploads raw files, secrets, or the local database."
author: "TraceGuard"
branding:
  icon: "shield"
  color: "green"

inputs:
  checks:
    description: "Comma-separated check commands to run (e.g. 'npm run build, npm test')."
    required: false
    default: ""
  fail-on-risky:
    description: "Fail the job if risky diffs or secret-like changes are detected."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: TraceGuard scan
      shell: bash
      run: |
        echo "::group::TraceGuard"
        bash "${{ github.action_path }}/scripts/ci-scan.sh" \
          --checks "${{ inputs.checks }}" \
          --fail-on-risky "${{ inputs.fail-on-risky }}"
        echo "::endgroup::"

    - name: Upload sanitized summary
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: traceguard-summary
        path: traceguard-summary.json
        if-no-files-found: ignore
